services:
  - type: web
    name: climate-risk-prototype-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ALLOWED_ORIGINS
        value: http://127.0.0.1:5173,http://localhost:5173,https://climate-risk-prototype.kaungkhantko.top
