<!doctype html>
<html class="light" lang="my">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2D6A4F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Climate Monitor" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Climate Monitor Myanmar</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260321" />
    <link rel="icon" href="/favicon.ico?v=20260321" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png?v=20260321" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png?v=20260321" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png?v=20260321" />
    <link rel="manifest" href="/site.webmanifest?v=20260321" />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&family=Noto+Serif:wght@400;700&family=Padauk:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#2D6A4F',
              'on-primary': '#ffffff',
              'primary-container': '#b1f0ce',
              'on-primary-container': '#002114',
              secondary: '#7d5800',
              'on-secondary': '#ffffff',
              'secondary-container': '#ffb702',
              'on-secondary-container': '#6b4b00',
              tertiary: '#713638',
              'on-tertiary': '#ffffff',
              error: '#ba1a1a',
              'on-error': '#ffffff',
              'error-container': '#ffdad6',
              'on-error-container': '#93000a',
              background: '#fbfbe2',
              'on-background': '#1b1d0e',
              surface: '#fbfbe2',
              'on-surface': '#1b1d0e',
              'surface-variant': '#e4e4cc',
              'on-surface-variant': '#5d655f',
              outline: '#707973',
              'surface-container-low': '#f5f5dc',
              'surface-container': '#efefd7',
              'surface-container-high': '#eaead1',
            },
            fontFamily: {
              headline: ['Be Vietnam Pro', 'Padauk', 'sans-serif'],
              body: ['Noto Serif', 'Padauk', 'serif'],
              label: ['Be Vietnam Pro', 'Padauk', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '0.5rem',
              lg: '1rem',
              xl: '1.5rem',
              '2xl': '2rem',
              '3xl': '2.5rem',
              full: '9999px',
            },
          },
        },
      }
    </script>
    <style>
      body { font-family: 'Noto Serif', 'Padauk', serif; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      @keyframes leaf-wave-float {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(-8deg) scale(0.94); opacity: 0.42; }
        25% { transform: translate3d(8px, -12px, 0) rotate(2deg) scale(1); opacity: 0.9; }
        50% { transform: translate3d(18px, -3px, 0) rotate(10deg) scale(1.08); opacity: 1; }
        75% { transform: translate3d(28px, 10px, 0) rotate(2deg) scale(0.98); opacity: 0.7; }
      }
      @keyframes leaf-wave-line {
        0%, 100% { transform: scaleX(0.92) translateY(0); opacity: 0.35; }
        50% { transform: scaleX(1.03) translateY(-4px); opacity: 0.85; }
      }
      @keyframes leaf-wave-glow {
        0%, 100% { transform: scale(0.96); opacity: 0.25; }
        50% { transform: scale(1.04); opacity: 0.55; }
      }
      .leaf-wave-loader {
        position: relative;
        width: min(19rem, 78vw);
        height: 9rem;
      }
      .leaf-wave-loader::before {
        content: '';
        position: absolute;
        inset: 1.8rem 0.4rem 1.8rem;
        border-radius: 9999px;
        background:
          radial-gradient(circle at 25% 50%, rgba(177, 240, 206, 0.95), transparent 42%),
          radial-gradient(circle at 75% 50%, rgba(45, 106, 79, 0.18), transparent 36%),
          linear-gradient(90deg, rgba(45, 106, 79, 0.08), rgba(177, 240, 206, 0.55), rgba(45, 106, 79, 0.08));
        filter: blur(14px);
        animation: leaf-wave-glow 1.9s ease-in-out infinite;
      }
      .leaf-wave-loader__line {
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 1.1rem;
        border-radius: 9999px;
        background: linear-gradient(90deg, rgba(45, 106, 79, 0.04), rgba(45, 106, 79, 0.35), rgba(177, 240, 206, 0.85), rgba(45, 106, 79, 0.35), rgba(45, 106, 79, 0.04));
        transform: translateY(-50%);
        animation: leaf-wave-line 1.45s ease-in-out infinite;
      }
      .leaf-wave-loader__leaf {
        position: absolute;
        top: 50%;
        left: 0;
        color: #2D6A4F;
        filter: drop-shadow(0 10px 24px rgba(45, 106, 79, 0.16));
        animation: leaf-wave-float 1.45s ease-in-out infinite;
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body class="bg-background text-on-surface min-h-screen pb-24 xl:pb-0 xl:pl-72">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
